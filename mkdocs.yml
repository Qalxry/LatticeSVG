site_name: LatticeSVG
site_description: Grid-based vector layout engine — CSS Grid layout to SVG/PNG
site_url: https://latticesvg.github.io/LatticeSVG/
repo_url: https://github.com/nicholasgasior/LatticeSVG
repo_name: LatticeSVG

strict: !ENV [MKDOCS_STRICT, false]

theme:
  name: material
  language: zh
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: 切换至深色模式
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: 切换至浅色模式
  font:
    text: Noto Sans SC
    code: JetBrains Mono
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.indexes
    - content.code.copy
    - content.tabs.link
    - search.suggest
    - search.highlight
    - toc.follow
  icon:
    repo: fontawesome/brands/github

plugins:
  - search
  - i18n:
      docs_structure: suffix
      languages:
        - locale: zh
          default: true
          name: 简体中文
          build: true
        - locale: en
          name: English
          build: true
          nav_translations:
            首页: Home
            快速开始: Getting Started
            安装: Installation
            快速上手: Quick Start
            核心概念: Core Concepts
            教程: Tutorials
            Grid 布局: Grid Layout
            文本排版: Text & Typography
            节点类型: Node Types
            样式与视觉: Styling & Visuals
            富文本与标记: Rich Text & Markup
            高级用法: Advanced Usage
            参考: Reference
            CSS 属性: CSS Properties
            内置模板: Built-in Templates
            API 参考: API Reference
            概览: Overview
            节点: Nodes
            渲染器: Renderer
            样式系统: Style System
            文本引擎: Text Engine
            布局引擎: Layout Engine
            标记解析: Markup Parser
            数学公式: Math
            更新日志: Changelog
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          paths: [src]
          options:
            show_source: true
            show_bases: true
            members_order: source
            docstring_style: numpy
            docstring_section_style: spacy
            show_root_heading: true
            show_root_full_path: false
            merge_init_into_class: true
            show_signature_annotations: true
            separate_signature: true
  - glightbox

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.arithmatex:
      generic: true
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - def_list
  - pymdownx.tasklist:
      custom_checkbox: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/nicholasgasior/LatticeSVG
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/latticesvg/
  alternate:
    - name: 简体中文
      link: /
      lang: zh
    - name: English
      link: /en/
      lang: en

extra_css:
  - assets/stylesheets/extra.css

extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

nav:
  - 首页: index.md
  - 快速开始:
    - 安装: getting-started/installation.md
    - 快速上手: getting-started/quickstart.md
    - 核心概念: getting-started/concepts.md
  - 教程:
    - Grid 布局: tutorials/grid-layout.md
    - 文本排版: tutorials/text-typography.md
    - 节点类型: tutorials/node-types.md
    - 样式与视觉: tutorials/styling.md
    - 富文本与标记: tutorials/rich-text.md
    - 高级用法: tutorials/advanced.md
  - 参考:
    - CSS 属性: reference/css-properties.md
    - 内置模板: reference/templates.md
    - API 参考:
      - 概览: reference/api/index.md
      - 节点: reference/api/nodes.md
      - 渲染器: reference/api/renderer.md
      - 样式系统: reference/api/style.md
      - 文本引擎: reference/api/text.md
      - 布局引擎: reference/api/layout.md
      - 标记解析: reference/api/markup.md
      - 数学公式: reference/api/math.md
  - 更新日志: changelog.md
